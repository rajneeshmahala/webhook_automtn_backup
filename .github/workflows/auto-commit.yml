name: Daily DevOps Practice Commit

on:
  schedule:
    - cron: "0 4 * * *"    # 9:30 AM IST
    - cron: "0 9 * * *"    # 2:30 PM IST
    - cron: "0 15 * * *"   # 8:30 PM IST
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update Practice Log
        run: |
          echo "Practice update at $(date)" >> practice-log.md

      - name: Commit Changes
        run: |
          git config --global user.name "Rajneesh Mahala"
          git config --global user.email "your-email@example.com"
          git add .
          git commit -m "Daily DevOps practice update $(date)" || echo "No changes"

      - name: Push Changes
        run: |
          git push
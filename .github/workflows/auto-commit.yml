name: Daily DevOps Practice Commit

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 👈 THIS FIXES 403

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update File
        run: |
          echo "Practice update at $(date)" >> practice-log.md

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Daily DevOps practice update $(date)" || echo "No changes"
          git push
